version: 2

builds:
  - id: security-exporter
    main: ./cmd/security-exporter
    binary: security-exporter
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X security-exporter/pkg/config.Version={{.Version}}
      - -X security-exporter/pkg/config.BuildDate={{.Date}}
      - -X security-exporter/pkg/config.GitCommit={{.Commit}}
      - -X security-exporter/pkg/config.GoVersion={{.Env.GO_VERSION}}
    env:
      - CGO_ENABLED=0
dockers:
  - image_templates:
      - "ghcr.io/mickeyzzc/security-collector-exporter:{{ .Version }}-amd64"
      - "ghcr.io/mickeyzzc/security-collector-exporter:latest-amd64"
    build_flag_templates:
      - --label=org.opencontainers.image.title={{.ProjectName}}
      - --label=org.opencontainers.image.version={{.Version}}
      - --label=org.opencontainers.image.revision={{.Commit}}
      - --platform=linux/amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
  - image_templates:
      - "ghcr.io/mickeyzzc/security-collector-exporter:{{ .Version }}-arm64"
      - "ghcr.io/mickeyzzc/security-collector-exporter:latest-arm64"
    build_flag_templates:
      - --label=org.opencontainers.image.title={{.ProjectName}}
      - --label=org.opencontainers.image.version={{.Version}}
      - --label=org.opencontainers.image.revision={{.Commit}}
      - --platform=linux/arm64
    dockerfile: Dockerfile.goreleaser
    goarch: arm64
    use: buildx

docker_manifests:
  - name_template: "ghcr.io/mickeyzzc/security-collector-exporter:{{ .Version }}"
    image_templates:
      - "ghcr.io/mickeyzzc/security-collector-exporter:{{ .Version }}-amd64"
      - "ghcr.io/mickeyzzc/security-collector-exporter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/mickeyzzc/security-collector-exporter:latest"
    image_templates:
      - "ghcr.io/mickeyzzc/security-collector-exporter:latest-amd64"
      - "ghcr.io/mickeyzzc/security-collector-exporter:latest-arm64"

# ──────────────────────────────────────────────────────────────────────
# Release Notes 规范:
#   1. goreleaser 使用 "skip: true" 不自动生成 changelog
#   2. Release 创建后，用 gh release edit 手动写入 release notes
#   3. 格式模板见下方，保持与 v0.2.0 / v0.3.0 一致
#
#   ## What's New in vX.Y.Z
#   ### [分类标题]
#   - **功能名**: 描述
#   ## Assets
#   | File | Platform |
#   |------|----------|
#   | ..._linux_amd64.tar.gz | Linux x86_64 |
#   | ..._linux_arm64.tar.gz | Linux ARM64 |
#   ## Requirements
#   - Linux 5.4+ for eBPF ...
#   - Root or CAP_DAC_READ_SEARCH + CAP_SYS_PTRACE
#   - Go 1.26+
#   **Full Changelog**: ...compare/vPREV...vCURRENT
# ──────────────────────────────────────────────────────────────────────

changelog:
  skip: true

release:
  github:
    owner: mickeyzzc
    name: security-collector-exporter
